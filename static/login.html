<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForsysGPT — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0D0D2B 0%, #1a0a60 50%, #0D0D2B 100%);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,.35);
  }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #6B48FF, #00B4D8);
    border-radius: 16px;
    display: grid; place-items: center;
    font-size: 26px; font-weight: 800; color: #fff;
    margin: 0 auto 20px;
  }
  h1 {
    font-size: 22px; font-weight: 700; color: #0D0D2B;
    margin-bottom: 8px;
  }
  p {
    font-size: 14px; color: #6b7280; line-height: 1.55;
    margin-bottom: 28px;
  }
  .error {
    background: #fef2f2; border: 1px solid #fecaca;
    color: #dc2626; font-size: 13.5px; border-radius: 10px;
    padding: 11px 14px; margin-bottom: 20px; text-align: left;
  }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 13px 20px;
    border: 1.5px solid #e5e7eb; border-radius: 12px;
    background: #fff; color: #0D0D2B;
    font-size: 15px; font-weight: 600;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    text-decoration: none;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .google-btn:hover {
    border-color: #6B48FF;
    box-shadow: 0 0 0 3px rgba(107,72,255,.12);
  }
  .google-btn svg { flex-shrink: 0; }
  .hint {
    margin-top: 20px; margin-bottom: 0;
    font-size: 12px; color: #9ca3af;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">F</div>
  <h1>ForsysGPT Dashboard</h1>
  <p>Sign in with your authorized Google account to view and manage leads.</p>

  <!-- ERROR_PLACEHOLDER -->

  <a href="/dashboard/auth/google" class="google-btn">
    <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </a>
  <p class="hint">Only authorized accounts can access this dashboard.</p>
</div>
</body>
</html>
